name: Deploy to Server

on:
  push:
    branches: [main, chore/deploy-pipeline-cleanup]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.meta.outputs.registry }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
      latest_image_uri: ${{ steps.meta.outputs.latest_image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set Image Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY="ghcr.io"
          REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${REGISTRY}/${REPO_LOWER}:${IMAGE_TAG}"
          LATEST_IMAGE_URI="${REGISTRY}/${REPO_LOWER}:latest"

          echo "registry=${REGISTRY}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "latest_image_uri=${LATEST_IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        shell: bash
        run: |
          set -euo pipefail

          REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          LATEST_IMAGE="ghcr.io/${REPO_LOWER}:latest"
          docker build -t "${{ steps.meta.outputs.image_uri }}" -t "${LATEST_IMAGE}" .
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${LATEST_IMAGE}"

  deploy:
    runs-on: ubuntu-latest
    needs: [build_and_push]
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Set Up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Open SSH Ingress For Runner
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_IP="$(curl -fsSL https://api.ipify.org)"
          echo "RUNNER_IP=${RUNNER_IP}" >> "${GITHUB_ENV}"
          echo "Opening SSH ingress for runner IP: ${RUNNER_IP}"

          if aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --region ap-southeast-2; then
            echo "Ingress rule added."
          else
            echo "Ingress add failed. Checking if duplicate rule already exists."
            EXISTING_RULE_COUNT="$(aws ec2 describe-security-groups \
              --group-ids "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
              --region ap-southeast-2 \
              --query "SecurityGroups[0].IpPermissions[?FromPort==\`22\` && ToPort==\`22\` && IpProtocol==\`tcp\`].IpRanges[?CidrIp=='${RUNNER_IP}/32'] | length(@)" \
              --output text)"
            if [[ "${EXISTING_RULE_COUNT}" == "1" ]]; then
              echo "Ingress rule already exists. Continuing."
            else
              echo "Failed to add ingress rule and no duplicate detected."
              exit 1
            fi
          fi

      - name: Deploy Over SSH
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="/opt/qroad"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > /tmp/private_key
          chmod 600 /tmp/private_key

          ssh -o StrictHostKeyChecking=accept-new -i /tmp/private_key ubuntu@api.qroad.info "
            set -euo pipefail &&
            sudo mkdir -p '${APP_DIR}' &&
            sudo chown ubuntu:ubuntu '${APP_DIR}' &&
            sudo mkdir -p /log/qroad-be &&
            sudo chown -R ubuntu:ubuntu /log/qroad-be
          "

          scp -o StrictHostKeyChecking=accept-new -i /tmp/private_key docker-compose.prod.yml ubuntu@api.qroad.info:${APP_DIR}/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=accept-new -i /tmp/private_key scripts/deploy.sh ubuntu@api.qroad.info:${APP_DIR}/deploy.sh

          ssh -o StrictHostKeyChecking=accept-new -i /tmp/private_key ubuntu@api.qroad.info "
            set -euo pipefail &&
            chmod +x '${APP_DIR}/deploy.sh' &&
            export APP_DIR='${APP_DIR}' &&
            export COMPOSE_FILE='docker-compose.prod.yml' &&
            export REGISTRY='${{ needs.build_and_push.outputs.registry }}' &&
            export REGISTRY_USERNAME='${{ secrets.GHCR_USERNAME }}' &&
            export REGISTRY_PASSWORD='${{ secrets.GHCR_TOKEN }}' &&
            export IMAGE_URI='${{ needs.build_and_push.outputs.image_uri }}' &&
            export LATEST_IMAGE_URI='${{ needs.build_and_push.outputs.latest_image_uri }}' &&
            export DB_URL='${{ secrets.DB_URL }}' &&
            export DB_USERNAME='${{ secrets.DB_USERNAME }}' &&
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}' &&
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' &&
            export AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET }}' &&
            export AWS_REGION='${{ secrets.AWS_REGION }}' &&
            export AWS_S3_PRESIGN_EXP_MINUTES='${{ secrets.AWS_S3_PRESIGN_EXP_MINUTES }}' &&
            export JWT_SECRET='${{ secrets.JWT_SECRET }}' &&
            export SPRING_AUTOCONFIGURE_EXCLUDE='org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration' &&
            '${APP_DIR}/deploy.sh'
          "

      - name: Close SSH Ingress For Runner
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RUNNER_IP:-}" ]]; then
            echo "RUNNER_IP is not set; skipping ingress revoke."
            exit 0
          fi

          echo "Closing SSH ingress for runner IP: ${RUNNER_IP}"
          if aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --region ap-southeast-2; then
            echo "Ingress rule removed."
          else
            echo "Ingress revoke failed. Checking if rule is already absent."
            EXISTING_RULE_COUNT="$(aws ec2 describe-security-groups \
              --group-ids "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
              --region ap-southeast-2 \
              --query "SecurityGroups[0].IpPermissions[?FromPort==\`22\` && ToPort==\`22\` && IpProtocol==\`tcp\`].IpRanges[?CidrIp=='${RUNNER_IP}/32'] | length(@)" \
              --output text)"
            if [[ "${EXISTING_RULE_COUNT}" == "0" ]]; then
              echo "Ingress rule already absent. Continuing."
            else
              echo "Failed to revoke ingress rule and it still exists."
              exit 1
            fi
          fi
